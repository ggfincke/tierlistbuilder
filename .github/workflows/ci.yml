name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      # tsc -b walks tsconfig.app.json, tsconfig.node.json, & convex/tsconfig.json
      # via the project references in tsconfig.json. convex/_generated/*.d.ts
      # files are committed (the .js siblings are gitignored) so the convex
      # source files typecheck against the real api shape w/o needing a CI deploy
      - run: npx tsc -b --noEmit
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
