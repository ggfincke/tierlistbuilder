name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npx tsc -b --noEmit
      # todo: convex function typecheck runs locally via `npx convex dev --once`
      # against a developer's own deployment. CI-side typecheck requires either
      # committing convex/_generated/ or provisioning a CI-only Convex deployment
      # w/ a stored token — deferred to a later PR
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
